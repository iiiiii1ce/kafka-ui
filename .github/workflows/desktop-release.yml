name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate_version:
    name: Validate version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate semantic version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            echo "Expected vMAJOR.MINOR.PATCH, for example v0.0.1." >&2
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: validate_version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS (Apple Silicon)
            platform: mac
            build_command: build:mac
          - os: windows-latest
            label: Windows (x64)
            platform: win
            build_command: build:win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set installer version from tag
        run: npm version "${{ needs.validate_version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Generate application icon
        run: npm run make-icons

      - name: Build application JAR
        run: npm run build:jar

      - name: Package installer
        run: npm run ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: kafbat-ui-desktop-${{ matrix.platform }}-${{ needs.validate_version.outputs.version }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.exe
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs:
      - validate_version
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create release and upload installers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t FILES < <(find artifacts -type f \( -name '*.dmg' -o -name '*.exe' \) -print)
          if (( ${#FILES[@]} != 2 )); then
            echo "Expected two installers, found ${#FILES[@]}." >&2
            printf '%s\n' "${FILES[@]}" >&2
            exit 1
          fi

          if gh release view "$TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber --repo "$REPOSITORY"
          else
            gh release create "$TAG" "${FILES[@]}" \
              --repo "$REPOSITORY" \
              --verify-tag \
              --title "Kafbat UI Desktop $TAG" \
              --generate-notes
          fi
